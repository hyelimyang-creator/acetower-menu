name: 에이스타워 급식 갱신

on:
  schedule:
    # 매일 오전 10:00~10:30 KST에 10분 간격 4회 (UTC+9 → 01:00~01:30 UTC).
    # 메뉴가 올라오는 즉시 잡으려고 여러 번 돈다. 이미 받은 날짜는 재OCR하지 않아 무료 한도에 영향 없음.
    - cron: "0,10,20,30 1 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests google-genai

      - name: 메뉴 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/build_menu.py

      - name: 변경 시 커밋
        run: |
          git config user.name "acetower-menu-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/acetower.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "메뉴 갱신 $(date -u +%FT%TZ)"
            git push
          fi
