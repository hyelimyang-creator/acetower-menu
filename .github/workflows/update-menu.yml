name: 에이스타워 급식 갱신

on:
  schedule:
    # 실제 게시 시각 관찰(2026-07): 중식 09:08~10:12, 석식 13:58. 편차가 커서 10분 간격으로 훑는다.
    # "올라오면 스톱"은 자동이다 — 이미 받은 날짜는 재OCR/재커밋을 건너뛰므로 이후 실행은 사실상 무동작.
    # (GitHub 예약 실행은 지연·누락이 잦아 촘촘히 도는 편이 안전하다.) UTC+9 = KST.
    - cron: "*/10 0-2 * * *"   # KST 09:00~11:50, 10분 간격 (중식)
    - cron: "*/20 5-6 * * *"   # KST 14:00~15:40, 20분 간격 (석식)
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests google-genai

      - name: 메뉴 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/build_menu.py

      - name: 변경 시 커밋
        run: |
          git config user.name "acetower-menu-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/acetower.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "메뉴 갱신 $(date -u +%FT%TZ)"
            git push
          fi
