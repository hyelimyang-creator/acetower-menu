name: 에이스타워 급식 갱신

on:
  schedule:
    # UTC 기준 (KST = UTC+9). 하루 3번: 10시·12시·17시(KST) 무렵 실행.
    - cron: "0 1 * * *"   # 10:00 KST
    - cron: "0 3 * * *"   # 12:00 KST
    - cron: "0 8 * * *"   # 17:00 KST
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests

      - name: 메뉴 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/build_menu.py

      - name: 변경 시 커밋
        run: |
          git config user.name "acetower-menu-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/acetower.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "메뉴 갱신 $(date -u +%FT%TZ)"
            git push
          fi
