name: 에이스타워 급식 갱신

on:
  schedule:
    # 실제 게시 시각 관찰 결과(2026-07): 중식 09:08~10:12, 석식 13:58. 편차가 있어 촘촘히 돈다.
    # (GitHub 예약 실행은 5~20분 지연이 흔해서 여러 번 도는 편이 안전하다.)
    # 이미 받은 날짜는 재OCR하지 않으므로 자주 돌아도 Gemini 무료 한도에 영향 없음. UTC+9 = KST.
    - cron: "0,20,40 0-1 * * *"   # KST 09:00~10:40, 20분 간격 (중식)
    - cron: "0,30 5 * * *"        # KST 14:00 / 14:30 (석식)
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests google-genai

      - name: 메뉴 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/build_menu.py

      - name: 변경 시 커밋
        run: |
          git config user.name "acetower-menu-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/acetower.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "메뉴 갱신 $(date -u +%FT%TZ)"
            git push
          fi
